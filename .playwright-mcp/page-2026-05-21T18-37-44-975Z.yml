    - heading "Česta pitanja o kvaru veš mašina" [level=2] [ref=e133]
    - generic [ref=e134]:
      - generic [ref=e135] [cursor=pointer]:
        - text: Zašto moja veš mašina jako vibrira i "šeta" po podu?
        - generic [ref=e136]: +
      - generic: Najčešći uzroci su istrošeni amortizeri ili oslonci bubnja. Može biti i neravnomerna raspodela veša u bubnju. Ako vibrira stalno bez obzira na punjenje — pozovite nas za pregled.
    - generic [ref=e137]:
      - generic [ref=e138] [cursor=pointer]:
        - text: Zašto veš ostaje mokar posle centrifuge?
        - generic [ref=e139]: +
      - generic: Najčešće su u pitanju istrošene četkice motora ili kvar samog motora. Može biti i problem sa elektronikom. U oba slučaja je zamena jeftinija od kupovine nove mašine.
    - generic [ref=e140]:
      - generic [ref=e141] [cursor=pointer]:
        - text: Zašto moja veš mašina curi vodu?
        - generic [ref=e142]: +
      - generic: Najčešći uzroci curenja vode su oštećena guma vrata (manšeta), pukla creva ili kvar pumpe. Manšeta se zamenjuje bez velikih troškova. Pozovite nas — utvrđujemo uzrok pre dolaska.
    - generic [ref=e143]:
      - generic [ref=e144] [cursor=pointer]:
        - text: Zašto veš mašina ne greje vodu?
        - generic [ref=e145]: +
      - generic: Najčešći uzrok je pregoreo grejač (termogrejač) ili kamenac koji ga je onesposobio. Grejač se relativno lako menja i košta od 1.500 do 3.500 din zavisno od modela.
    - generic [ref=e146]:
      - generic [ref=e147] [cursor=pointer]:
        - text: Veš mašina stoji u vodi — ne prazni posle pranja?
        - generic [ref=e148]: +
      - generic: Razlog je gotovo uvek začepljen filter pumpe ili kvar same pumpe za pražnjenje. Filter se može očistiti, ali ako je pumpa pokvarena — menja se. Pozovite nas za procenu.
    - generic [ref=e149]:
      - generic [ref=e150] [cursor=pointer]:
        - text: Zašto veš mašina ne zaključava ili ne otvara vrata?
        - generic [ref=e151]: +
      - generic: Uzrok je skoro uvek kvar bravice vrata (interlock). Zamena bravice je jednostavna i brza popravka koja ne zahteva demontažu mašine. Dođemo, zamenjujemo i gotovo.
    - generic [ref=e152]:
      - generic [ref=e153] [cursor=pointer]:
        - text: Veš mašina se ne pali ili pokazuje grešku na displeju?
        - generic [ref=e154]: +
      - generic: Problem je najčešće u elektronici — modul, programator ili RSO filter. Kod starijih mašina uzrok može biti i pregoreo termostat. Dijagnostika nam je besplatna pri poseti.
    - generic [ref=e155]:
      - generic [ref=e156] [cursor=pointer]:
        - text: Koliko košta servis veš mašine?
        - generic [ref=e157]: +
      - generic: Cena zavisi od tipa kvara. Izlazak košta 2.000 din i uračunat je u cenu popravke ako je kvar rešen. Jednostavne popravke (četkice, pumpa, grejač) počinju od 1.500 din + delovi. Pozovite za grublu procenu pre dolaska.
    - generic [ref=e158]:
      - generic [ref=e159] [cursor=pointer]:
        - text: Da li dolazite na adresu u celom Beogradu?
        - generic [ref=e160]: +
      - generic: Da, servisiramo ceo Beograd — Žarkovo, Čukarica, Rakovica, Novi Beograd, Zemun, Voždovac, Palilula i ostale opštine.

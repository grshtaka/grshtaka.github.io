  - generic [ref=e100]:
    - heading "Popravka Veš Mašina i Sušara u Beogradu" [level=2] [ref=e101]
    - paragraph [ref=e102]:
      - text: Pokvarena veš mašina može biti veliki problem za svako domaćinstvo. Umesto da kupujete novi uređaj, pozovite naš servis —
      - strong [ref=e103]: Super Elektrik
      - text: ima 30+ godina iskustva u popravci veš mašina svih brendova. Dolazimo direktno na Vašu adresu, a najčešće rešavamo kvar tokom iste posete.
    - paragraph [ref=e104]:
      - text: Izlazak naplaćujemo
      - strong [ref=e105]: 2.000 din
      - text: — ali ako popravka bude urađena, izlazak je uračunat u ukupnu cenu.
    - heading "Detalji najčešćih kvarova" [level=3] [ref=e106]
    - paragraph [ref=e107]:
      - strong [ref=e108]: Trošenje ležajeva ili semeringova
      - text: (~17% kvarova) prepoznajete po bučnom radu tokom centrifuge, naročito pri višim obrtajima. Uzrok je najčešće pranje sa previše veša.
      - strong [ref=e109]: Propali amortizeri
      - text: (~15%) dovode do toga da mašina vibrira i šeta po podu.
    - paragraph [ref=e110]:
      - strong [ref=e111]: Kvar elektronike
      - text: je sve učestaliji na modernim mašinama. Uzrok je obično neispravan RSO filter ili fluktuacije napona.
      - strong [ref=e112]: Istrošene četkice motora
      - text: (~12%) dovode do toga da veš ostaje mokar jer mašina prestaje da centrifugira.

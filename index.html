<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE GARDEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/garden.css?v=28">
</head>
<body>

<canvas id="petals" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;"></canvas>

<!-- CRT: single overlay over the entire page -->
<div id="crt" class="crt-boot" aria-hidden="true"><div class="crt-mask"></div><div class="crt-scan"></div></div>

<div id="cursor"></div>

<!-- BOOT -->
<div id="boot" class="screen active">
  <div id="boot-lines"></div>
  <div id="boot-title">The Garden</div>
  <div id="boot-sub">a place where things come to remain</div>
  <div id="boot-prompt">&gt; PRESS TO ENTER</div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="screen">
  <div class="dash-header">
    <div class="dash-kicker">C:\GARDEN -- WELCOME</div>
    <div class="dash-title">The Manifold</div>
    <div class="dash-actions">
      <a href="#" id="dash-btn-manifold">[ THE ROOTS -- HOW PAGES CONNECT ]</a>
    </div>
  </div>
  <hr>
  <div class="dir-label">C:\GARDEN\</div>
  <table class="file-table" id="file-table"></table>
  <hr style="margin-top:3vh;">
  <div class="dir-end">[ END OF DIRECTORY ]</div>
</div>

<!-- READER -->
<div id="reader" class="screen">
  <div class="reader-top">
    <span class="breadcrumb" id="breadcrumb"></span>
    <span class="reader-kind" id="reader-kind"></span>
  </div>
  <hr>
  <div class="codex" id="codex">
    <div class="codex-bg" id="codex-bg"></div>
    <span class="codex-corner tl" id="codex-tl"></span>
    <span class="codex-corner tr" id="codex-tr"></span>
    <span class="codex-corner bl" id="codex-bl"></span>
    <span class="codex-corner br" id="codex-br"></span>
    <span class="codex-vine left" id="vine-left"></span>
    <span class="codex-vine right" id="vine-right"></span>
    <div class="reader-body" id="reader-body"></div>
    <div class="codex-foot">
      <span class="catch catch-prev" id="catch-prev"></span>
      <span class="catch catch-next" id="catch-next"></span>
    </div>
  </div>
</div>

<!-- MANIFOLD -->
<div id="manifold" class="screen">
  <div class="reader-nav">
    <a id="manifold-back">[ BACK ]</a>
  </div>
  <hr>
  <div class="manifold-head">THE ROOTS -- how the pages connect beneath the garden</div>
  <div class="manifold-map" id="manifold-map"></div>
</div>

<!-- STATUS -->
<div id="statusbar">
  <span class="live" id="status-file">NO FILE OPEN</span>
  <span id="status-time"></span>
  <span class="sb-right">THE WORLD CONTINUES ELSEWHERE</span>
</div>

<script src="data/entries.js?v=22"></script>
<script src="js/atmosphere.js?v=12"></script>
<script src="js/garden.js?v=22"></script>
</body>
</html>

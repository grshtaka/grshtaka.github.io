<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE GARDEN</title>
<style>
@font-face {
  font-family: "BIOS";
  src: url("https://grshtaka.github.io/SSaS/dos.ttf");
}

::-webkit-scrollbar { width: 16px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #fff; }

::selection { background: white; color: black; }
::-moz-selection { background: white; color: black; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: "BIOS" !important; }
* { cursor: none !important; }

body {
  background-color: #000;
  color: white;
  font-family: "BIOS";
  font-size: 20px;
  margin: 0;
  padding: 3vh;
  min-height: 100vh;
  cursor: none;
}

a {
  color: white;
  font-family: "BIOS";
  font-size: 20px;
  margin: 0; padding: 0;
  text-decoration: none;
  cursor: none;
}
a:hover { color: black; background-color: white; transition-delay: 100ms; }

pre {
  color: white;
  font-family: "BIOS";
  font-size: 20px;
  margin: 0; padding: 0;
  white-space: pre-wrap;
}
pre::selection { background: white; color: black; }

hr { margin: 0; padding: 0; border: 1px solid #333; }

/* CRT */
html::after {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 101;
  background-image: repeating-linear-gradient(
    rgba(255,0,0,0.12) 9px,
    rgba(0,255,0,0.07) 10px,
    rgba(0,0,255,0.03) 25px
  );
  opacity: 0.6;
  animation: crt-static 2.7s steps(53) infinite, crt-flicker 0.25s infinite;
}
html::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 100;
  background:
    linear-gradient(rgba(0,0,0,0) 40%, rgba(0,0,0,0.25) 30%),
    linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.03), rgba(0,0,255,0.05)),
    radial-gradient(ellipse at center, rgba(255,255,255,0.12) 10%, rgba(255,255,255,0) 80%);
  background-size: 100% 4px, 9px 100%;
  transform: perspective(500px) scale(1.04);
  transform-origin: center;
  box-shadow:
    inset 0 0 5vh rgba(255,255,255,0.65),
    inset 0 0 220px rgba(0,0,0,0.6),
    inset 0 0 50vw rgba(0,0,0,0.45),
    inset 0 0 8vw rgba(255,255,255,0.08);
}
@keyframes crt-flicker { 0%{opacity:.12} 50%{opacity:.16} 100%{opacity:.14} }
@keyframes crt-static { 0%{background-position:0 -2000px} 100%{background-position:0 1500px} }

/* cursor */
#cursor {
  position: fixed;
  width: 18px; height: 18px;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-9px, -9px);
}
#cursor::before {
  content: '';
  position: absolute;
  left: 8px; top: 0;
  width: 2px; height: 18px;
  background: white;
  opacity: 0.8;
}
#cursor::after {
  content: '';
  position: absolute;
  top: 8px; left: 0;
  width: 18px; height: 2px;
  background: white;
  opacity: 0.8;
}

/* screens */
.screen { display: none; }
.screen.active { display: block; }

/* BOOT */
#boot.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  min-height: 90vh;
}
#boot-lines {
  position: absolute;
  top: 3vh;
  left: 3vh;
  text-align: left;
}
.boot-line {
  font-size: 20px;
  color: white;
  opacity: 0;
  margin-bottom: 2px;
  transition: opacity .1s;
}
.boot-line.lit { opacity: 1; }
#boot-title {
  font-family: "BIOS";
  font-size: 64px;
  color: white;
  margin: 4vh 0 1vh;
  opacity: 0;
  line-height: 1.1;
  white-space: pre;
  transition: color .3s;
}
#boot-title:hover { color: #888; }
#boot-sub {
  font-family: "BIOS";
  font-size: 16px;
  color: #888;
  opacity: 0;
  margin-bottom: 5vh;
}

/* DASH */
.dash-header { margin-bottom: 3vh; }
.dash-header pre { margin-bottom: 4px; }
.intro-text {
  font-family: "BIOS";
  font-size: 18px;
  color: #ccc;
  line-height: 2;
  margin: 3vh 0;
  padding-left: 2vw;
  border-left: 2px solid white;
}
.file-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 2vh;
}
.file-table tr { border-bottom: 1px solid #222; cursor: pointer; }
.file-table tr:hover td { background: white; color: black; }
.file-table td {
  font-family: "BIOS";
  font-size: 20px;
  padding: 8px 12px 8px 0;
  color: white;
}
.col-idx { color: #444; width: 48px; }
.file-table tr:hover .col-idx { color: black; }
.col-kind { color: #555; text-align: right; font-size: 16px; }
.file-table tr:hover .col-kind { color: black; }

/* READER */
.reader-nav {
  margin-bottom: 3vh;
  display: flex;
  gap: 3vw;
  align-items: center;
  flex-wrap: wrap;
}
.reader-path {
  margin-left: auto;
  font-size: 14px;
  color: #444;
  font-family: "BIOS";
}
.reader-fname { display: none; }
.reader-heading { font-family: "BIOS"; font-size: 36px; color: white; margin-bottom: 8px; }
.reader-kind { font-family: "BIOS"; font-size: 16px; color: #666; margin-bottom: 4vh; display: block; }

.reader-body {
  font-family: "BIOS";
  font-size: 20px;
  color: white;
  line-height: 2.1;
  overflow-y: auto;
  max-height: 65vh;
  padding-right: 1vw;
}
.reader-body::-webkit-scrollbar { width: 16px; }
.reader-body::-webkit-scrollbar-track { background: #000; }
.reader-body::-webkit-scrollbar-thumb { background: #fff; }

.verse-stanza { margin-bottom: 2em; }
.verse-line {
  display: block;
  min-height: 1.2em;
}
.refrain {
  display: block;
  color: #777;
  margin: 2px 0;
  min-height: 1.2em;
}

.reader-footer {
  margin-top: 4vh;
  padding-top: 2vh;
  border-top: 1px solid #333;
  display: flex;
}
.footer-btn {
  font-family: "BIOS";
  font-size: 18px;
  color: white;
  cursor: pointer;
  padding: 4px 8px;
}
.footer-btn:hover { color: black; background: white; }
.footer-right { margin-left: auto; }

/* STATUS */
#statusbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 6px 3vh;
  font-family: "BIOS";
  font-size: 14px;
  color: #333;
  border-top: 1px solid #111;
  background: #000;
  z-index: 50;
  display: flex;
  gap: 4vw;
}
#statusbar .live { color: #666; }
</style>
</head>

// cursor
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
});

// time
function tick() {
  const n = new Date();
  document.getElementById('status-time').textContent =
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
setInterval(tick,1000); tick();

// screens
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// boot
const BOOT_LINES = [
  'THE GARDEN v0.1.0',
  'INITIALIZING...',
  'LOADING MEMORY FRAGMENTS...',
  'CALIBRATING PATTERN ENGINE...',
  'SHADOW ARCHIVE: MOUNTED',
  'DREAM BUFFER: READY',
  '> ALL SYSTEMS NOMINAL.',
];
function runBoot() {
  const c = document.getElementById('boot-lines');
  let i = 0;
  function step() {
    if(i >= BOOT_LINES.length) {
      setTimeout(()=>{
        document.getElementById('boot-title').style.opacity='1';
        setTimeout(()=>{
          document.getElementById('boot-sub').style.opacity='1';
        },300);
      },400);
      return;
    }
    const el = document.createElement('div');
    el.className='boot-line';
    el.textContent=BOOT_LINES[i];
    c.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('lit')));
    i++;
    setTimeout(step,200);
  }
  step();
}
document.getElementById('boot-title').addEventListener('click',()=>{
  show('dash'); buildTable();
  document.getElementById('status-file').textContent='THE GARDEN -- BROWSING';
});

// table
function buildTable() {
  const t = document.getElementById('file-table');
  if(t.children.length) return;
  FILES.forEach((f,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML=`<td class="col-idx">${String(i+1).padStart(2,'0')}</td><td>${f.name}</td><td class="col-kind">${f.kind}</td>`;
    tr.addEventListener('click',()=>openFile(i));
    t.appendChild(tr);
  });
}

// reader
let cur_idx = 0;
function openFile(idx) {
  cur_idx = idx;
  const f = FILES[idx];
  show('reader');
  document.getElementById('reader-path').textContent = f.path;
  document.getElementById('reader-fname').textContent = f.name;
  document.getElementById('reader-heading').textContent = f.heading;
  document.getElementById('reader-kind').textContent = f.kind;
  document.getElementById('status-file').textContent = f.name + ' -- OPEN';

  const body = document.getElementById('reader-body');
  body.innerHTML='';
  let stanza = document.createElement('div');
  stanza.className='verse-stanza';
  f.content.forEach(item=>{
    if(item.t==='stanza'){
      if(stanza.children.length) body.appendChild(stanza);
      stanza=document.createElement('div');
      stanza.className='verse-stanza';
    } else {
      const span=document.createElement('span');
      span.className = item.t==='refrain' ? 'refrain' : 'verse-line';
      span.dataset.text = item.text;
      span.style.fontFamily = '"BIOS"';
      span.style.color = 'transparent';
      span.textContent = item.text;
      stanza.appendChild(span);
    }
  });
  if(stanza.children.length) body.appendChild(stanza);

  setTimeout(()=>{
    const els = Array.from(body.querySelectorAll('.verse-line,.refrain'));
    let lineIdx = 0;
    function typeLine() {
      if(lineIdx >= els.length) return;
      const el = els[lineIdx];
      const full = el.dataset.text;
      const isRefrain = el.classList.contains('refrain');
      el.style.color = isRefrain ? '#777' : 'white';
      el.textContent = '';
      let charIdx = 0;
      function typeChar() {
        if(charIdx < full.length) {
          el.textContent += full[charIdx];
          charIdx++;
          setTimeout(typeChar, 3 + Math.random() * 3);
        } else {
          lineIdx++;
          setTimeout(typeLine, 10);
        }
      }
      typeChar();
    }
    typeLine();
  }, 100);

  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.textContent = idx>0 ? '[ < '+FILES[idx-1].name+' ]' : '';
  next.textContent = idx<FILES.length-1 ? '[ '+FILES[idx+1].name+' > ]' : '';
  prev.onclick = idx>0 ? ()=>openFile(idx-1) : null;
  next.onclick = idx<FILES.length-1 ? ()=>openFile(idx+1) : null;
}

document.getElementById('back-btn').addEventListener('click',()=>{
  show('dash');
  document.getElementById('status-file').textContent='THE GARDEN -- BROWSING';
});
document.getElementById('dash-btn').addEventListener('click',()=>{
  show('dash');
  document.getElementById('status-file').textContent='THE GARDEN -- BROWSING';
});

// falling petals
const petalCanvas = document.getElementById('petals');
const pc = petalCanvas.getContext('2d');
let pW, pH, petalList = [];
let petalOpacity = 0;
function resizePetals() {
  pW = petalCanvas.width = window.innerWidth;
  pH = petalCanvas.height = window.innerHeight;
}
resizePetals();
window.addEventListener('resize', resizePetals);

function makePetal() {
  const size = 4 + Math.random() * 7;
  const depth = Math.random();
  return {
    type: 'leaf',
    x: Math.random() * pW,
    y: -20,
    size: size * (0.6 + depth * 0.6),
    variant: Math.floor(Math.random() * 4),
    speedY: (0.2 + Math.random() * 0.4) + depth * 0.5,
    speedX: (Math.random() - 0.5) * 0.3,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.018 * (0.4 + depth * 0.8),
    alpha: 0.06 + depth * 0.28,
    depth,
    sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.003 + depth * 0.008,
  };
}

function makeTwig() {
  return {
    type: 'twig',
    x: Math.random() * pW,
    y: -20,
    len: 12 + Math.random() * 20,
    speedY: 0.3 + Math.random() * 0.5,
    speedX: (Math.random() - 0.5) * 0.25,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.008,
    alpha: 0.06 + Math.random() * 0.1,
    sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.003 + Math.random() * 0.005,
    branches: Math.floor(Math.random() * 2) + 1,
  };
}

for(let i = 0; i < 22; i++) {
  const p = makePetal();
  p.y = Math.random() * pH;
  petalList.push(p);
}
for(let i = 0; i < 6; i++) {
  const t = makeTwig();
  t.y = Math.random() * pH;
  petalList.push(t);
}

// wind — rare but powerful
let windStrength = 0;
let windTarget = 0;
let windTimer = 0;
let isGusting = false;
let gustLeafTimer = 0;

function updateWind() {
  windTimer--;
  if(windTimer <= 0) {
    if(!isGusting && Math.random() < 0.15) {
      isGusting = true;
      windTarget = (Math.random() < 0.5 ? 1 : -1) * (2.5 + Math.random() * 2);
      windTimer = 180 + Math.random() * 240;
    } else {
      isGusting = false;
      windTarget = (Math.random() - 0.5) * 0.2;
      windTimer = 1200 + Math.random() * 2400;
    }
  }
  windStrength += (windTarget - windStrength) * 0.003;

  if(isGusting) {
    gustLeafTimer--;
    if(gustLeafTimer <= 0) {
      const burst = makePetal();
      burst.y = Math.random() * pH * 0.8;
      burst.speedY = 0.8 + Math.random() * 1.2;
      petalList.push(burst);
      gustLeafTimer = 8 + Math.floor(Math.random() * 12);
    }
  }
}

// dust particles at bottom
const dustList = [];
function makeDust() {
  return {
    x: Math.random() * pW,
    y: pH - 2 - Math.random() * 18,
    r: 0.5 + Math.random() * 1.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -(Math.random() * 0.2),
    alpha: 0.05 + Math.random() * 0.15,
    life: 1,
    decay: 0.003 + Math.random() * 0.005,
  };
}
for(let i = 0; i < 40; i++) dustList.push(makeDust());

function updateDust() {
  const windFactor = Math.abs(windStrength);
  for(let i = dustList.length - 1; i >= 0; i--) {
    const d = dustList[i];
    d.x += d.vx + windStrength * 0.6;
    d.y += d.vy;
    d.life -= d.decay * (1 + windFactor * 0.5);
    if(d.life <= 0 || d.y < pH - 60) {
      dustList[i] = makeDust();
      dustList[i].x = windStrength > 0 ? Math.random() * pW * 0.3 : pW * 0.7 + Math.random() * pW * 0.3;
    }
  }
  if(isGusting && dustList.length < 120) {
    dustList.push(makeDust());
  }
}

function drawDust() {
  dustList.forEach(d => {
    pc.beginPath();
    pc.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    pc.fillStyle = `rgba(255,255,255,${d.alpha * d.life * petalOpacity})`;
    pc.fill();
  });
}

// grass
const grassBlades = [];
let grassOpacity = 0;
function initGrass() {
  grassBlades.length = 0;
  const count = Math.floor(pW / 5);
  for(let i = 0; i < count; i++) {
    const depth = Math.random();
    grassBlades.push({
      x: (i / count) * pW + (Math.random() - 0.5) * 10,
      h: 40 + Math.random() * 60,
      lean: (Math.random() - 0.5) * 0.4,
      thick: 0.6 + Math.random() * 1.0,
      alpha: (0.03 + Math.random() * 0.05) + depth * 0.38,
      depth,
      sway: Math.random() * Math.PI * 2,
      swayAmt: 0.03 + Math.random() * 0.06,
    });
  }
}
initGrass();
window.addEventListener('resize', () => { resizePetals(); initGrass(); });

function drawGrass() {
  if(grassOpacity < 1) grassOpacity = Math.min(1, grassOpacity + 0.004);
  pc.save();
  const windLean = windStrength * 0.05;
  grassBlades.forEach(g => {
    g.sway += 0.009;
    const sway = Math.sin(g.sway) * g.swayAmt + windLean * g.depth;
    const tipX = g.x + sway * g.h * 4 + g.lean * g.h;
    const tipY = pH - g.h;
    const midX = g.x + sway * g.h * 2;
    const midY = pH - g.h * 0.55;
    const a = g.alpha * grassOpacity;

    // main stem
    pc.beginPath();
    pc.moveTo(g.x, pH);
    pc.quadraticCurveTo(midX, midY, tipX, tipY);
    pc.strokeStyle = `rgba(255,255,255,${a})`;
    pc.lineWidth = g.thick;
    pc.stroke();

    // seed head — small elongated oval at tip
    const headLen = g.h * 0.18;
    const angle = Math.atan2(tipY - midY, tipX - midX);
    pc.save();
    pc.translate(tipX, tipY);
    pc.rotate(angle + Math.PI / 2);
    pc.beginPath();
    pc.ellipse(0, 0, g.thick * 1.4, headLen, 0, 0, Math.PI * 2);
    pc.fillStyle = `rgba(255,255,255,${a * 0.5})`;
    pc.fill();
    pc.strokeStyle = `rgba(255,255,255,${a * 0.7})`;
    pc.lineWidth = 0.5;
    pc.stroke();

    // small barbs on seed head
    for(let b = -2; b <= 2; b++) {
      const bY = b * headLen * 0.3;
      const bLen = headLen * 0.25;
      pc.beginPath();
      pc.moveTo(-g.thick, bY);
      pc.lineTo(-bLen - g.thick, bY - bLen * 0.6);
      pc.strokeStyle = `rgba(255,255,255,${a * 0.55})`;
      pc.lineWidth = 0.5;
      pc.stroke();
      pc.beginPath();
      pc.moveTo(g.thick, bY);
      pc.lineTo(bLen + g.thick, bY - bLen * 0.6);
      pc.strokeStyle = `rgba(255,255,255,${a * 0.55})`;
      pc.lineWidth = 0.5;
      pc.stroke();
    }
    pc.restore();
  });
  pc.restore();
}

function drawLeaf(p) {
  pc.save();
  pc.translate(p.x, p.y);
  pc.rotate(p.rot);
  pc.globalAlpha = p.alpha * petalOpacity;
  const s = p.size;
  const v = p.variant;
  pc.beginPath();
  if(v === 0) {
    pc.moveTo(0, -s);
    pc.bezierCurveTo(s * 0.55, -s * 0.35, s * 0.55, s * 0.35, 0, s);
    pc.bezierCurveTo(-s * 0.55, s * 0.35, -s * 0.55, -s * 0.35, 0, -s);
  } else if(v === 1) {
    pc.moveTo(0, -s);
    pc.bezierCurveTo(s * 0.8, -s * 0.2, s * 0.4, s * 0.5, 0, s);
    pc.bezierCurveTo(-s * 0.3, s * 0.4, -s * 0.3, -s * 0.4, 0, -s);
  } else if(v === 2) {
    pc.moveTo(0, -s * 0.6);
    pc.bezierCurveTo(s * 0.9, -s * 0.1, s * 0.7, s * 0.5, 0, s * 0.7);
    pc.bezierCurveTo(-s * 0.7, s * 0.5, -s * 0.9, -s * 0.1, 0, -s * 0.6);
  } else {
    pc.moveTo(0, -s * 1.2);
    pc.bezierCurveTo(s * 0.3, -s * 0.4, s * 0.3, s * 0.4, 0, s * 1.2);
    pc.bezierCurveTo(-s * 0.3, s * 0.4, -s * 0.3, -s * 0.4, 0, -s * 1.2);
  }
  pc.fillStyle = 'rgba(255,255,255,0.12)';
  pc.fill();
  pc.strokeStyle = 'rgba(255,255,255,0.22)';
  pc.lineWidth = 0.7;
  pc.stroke();
  pc.beginPath();
  pc.moveTo(0, -s * 0.8);
  pc.lineTo(0, s * 0.8);
  pc.strokeStyle = 'rgba(255,255,255,0.07)';
  pc.lineWidth = 0.4;
  pc.stroke();
  pc.restore();
}

function drawTwig(p) {
  pc.save();
  pc.translate(p.x, p.y);
  pc.rotate(p.rot);
  pc.globalAlpha = p.alpha * petalOpacity;
  pc.strokeStyle = 'rgba(255,255,255,0.18)';
  pc.lineWidth = 0.6;
  const l = p.len;
  pc.beginPath();
  pc.moveTo(0, -l * 0.5);
  pc.lineTo(0, l * 0.5);
  pc.stroke();
  for(let b = 0; b < p.branches; b++) {
    const by = -l * 0.1 + (b * l * 0.3);
    const blen = l * 0.3 + Math.random() * l * 0.15;
    const bdir = b % 2 === 0 ? 1 : -1;
    pc.beginPath();
    pc.moveTo(0, by);
    pc.lineTo(bdir * blen * 0.7, by - blen * 0.6);
    pc.stroke();
  }
  pc.restore();
}

function animPetals() {
  pc.clearRect(0, 0, pW, pH);
  if(petalOpacity < 1) petalOpacity = Math.min(1, petalOpacity + 0.0015);
  updateWind();
  updateDust();

  // trim excess leaves during calm
  if(!isGusting && petalList.length > 34) petalList.splice(34);

  petalList.forEach((p, i) => {
    p.sway += p.swaySpeed;
    p.x += p.speedX + Math.sin(p.sway) * 0.35 + windStrength * (p.depth || 0.5);
    p.y += p.speedY;
    p.rot += p.rotSpeed + windStrength * 0.015;
    if(p.type === 'leaf') drawLeaf(p);
    else drawTwig(p);
    if(p.y > pH + 20 || p.x < -60 || p.x > pW + 60) {
      petalList[i] = Math.random() < 0.2 ? makeTwig() : makePetal();
    }
  });

  drawDust();
  drawGrass();
  requestAnimationFrame(animPetals);
}
animPetals();

window.addEventListener('load', runBoot);
</script>
</body>
</html>
